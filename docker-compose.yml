services:
  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://example.com}
    image: dream-app:latest
    container_name: dream-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-https://example.com}
    expose:
      - "3000"
    networks:
      - web

  nginx:
    image: nginx:alpine
    container_name: dream-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro      # SSL 证书目录
    depends_on:
      - app
    networks:
      - web

networks:
  web:
    driver: bridge
